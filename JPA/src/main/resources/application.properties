# Misma base de datos y credenciales que en el modulo taller-jdbc-puro
# (ver Paso 2 de la guia), para que la comparacion sea sobre los mismos
# datos.
spring.datasource.url=jdbc:postgresql://localhost:5432/taller_db
spring.datasource.username=taller
spring.datasource.password=taller
spring.datasource.driver-class-name=org.postgresql.Driver

# La tabla 'productos' ya existe y ya tiene 100 filas sembradas
# (Paso 3 de la guia): no queremos que Hibernate la recree ni la toque.
spring.jpa.hibernate.ddl-auto=none

# Opcional: pon esto en 'true' solo si quieres ver el SQL generado por
# Hibernate en consola durante el desarrollo.
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# Evita que Spring Boot busque un application-*.properties de perfil
# que no existe en este taller.
spring.profiles.active=default
